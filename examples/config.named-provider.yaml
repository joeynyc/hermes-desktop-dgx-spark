model:
  provider: custom:dgx-spark
  base_url: http://SPARK_IP:8000/v1
  default: MODEL_ID

providers:
  dgx-spark:
    name: DGX Spark
    api: http://SPARK_IP:8000/v1
    key_env: OPENAI_API_KEY
    default_model: MODEL_ID
    transport: openai_chat
    extra_body:
      chat_template_kwargs:
        enable_thinking: false
